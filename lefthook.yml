pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm biome check --apply {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck
      fail_text: "TypeScript compilation failed"
    test:
      run: echo "Tests will be implemented in next phase"

commit-msg:
  commands:
    conventional-commit:
      run: |
        # Skip commit message validation for now
        exit 0

pre-push:
  commands:
    check-branch:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "Direct push to main branch is not allowed"
          exit 1
        fi