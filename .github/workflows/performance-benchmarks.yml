name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/engine/src/**'
      - 'packages/engine/package.json'
      - '.github/workflows/performance-benchmarks.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/engine/src/**'
      - 'packages/engine/package.json'
  workflow_dispatch:
    inputs:
      stress_test:
        description: 'Enable stress testing'
        required: false
        default: false
        type: boolean
      regression_threshold:
        description: 'Performance regression threshold (%)'
        required: false
        default: '10'
        type: string

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-benchmarks:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      benchmark-score: ${{ steps.benchmark.outputs.benchmark-score }}
      benchmark-grade: ${{ steps.benchmark.outputs.benchmark-grade }}
      scenarios-passed: ${{ steps.benchmark.outputs.scenarios-passed }}
      scenarios-total: ${{ steps.benchmark.outputs.scenarios-total }}
      performance-change: ${{ steps.benchmark.outputs.performance-change }}
      regression-detected: ${{ steps.benchmark.outputs.regression-detected }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for baseline comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine package
        run: pnpm --filter @doom-like/engine build

      - name: Setup benchmark environment
        run: |
          # Create artifacts directory
          mkdir -p benchmark-artifacts
          
          # Set up display for headless browser testing (if needed)
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          
          # Configure memory limits for consistent testing
          echo "NODE_OPTIONS=--max-old-space-size=2048" >> $GITHUB_ENV

      - name: Download baseline (if exists)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline
          path: benchmark-artifacts/

      - name: Run performance benchmarks
        id: benchmark
        run: |
          cd packages/engine
          
          # Configure benchmark parameters
          TIMEOUT_MINUTES=5
          REGRESSION_THRESHOLD="${{ github.event.inputs.regression_threshold || '10' }}"
          STRESS_TEST="${{ github.event.inputs.stress_test || 'false' }}"
          
          # Set environment variables for benchmark runner
          export CI_ARTIFACTS_DIR="../../benchmark-artifacts"
          export CI_BRANCH="${{ github.ref_name }}"
          export ENABLE_STRESS_TEST="$STRESS_TEST"
          
          # Run benchmarks with CI configuration
          pnpm tsx src/performance/ci-benchmark-runner.ts \
            --timeout "$TIMEOUT_MINUTES" \
            --regression-threshold "$REGRESSION_THRESHOLD"
        env:
          CI: true
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark-artifacts/
          retention-days: 30

      - name: Upload baseline (main branch only)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          name: performance-baseline
          path: benchmark-artifacts/baseline.json
          retention-days: 90

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.benchmark.outputs.benchmark-score }}';
            const grade = '${{ steps.benchmark.outputs.benchmark-grade }}';
            const passed = '${{ steps.benchmark.outputs.scenarios-passed }}';
            const total = '${{ steps.benchmark.outputs.scenarios-total }}';
            const change = '${{ steps.benchmark.outputs.performance-change }}';
            const regression = '${{ steps.benchmark.outputs.regression-detected }}' === 'true';

            const getGradeEmoji = (grade) => {
              switch(grade) {
                case 'A': return '🟢';
                case 'B': return '🟡';
                case 'C': return '🟠';
                case 'D': return '🔴';
                case 'F': return '💀';
                default: return '❓';
              }
            };

            const getChangeEmoji = (change) => {
              const changeNum = parseFloat(change);
              if (changeNum > 5) return '🚀';
              if (changeNum > 0) return '📈';
              if (changeNum < -5) return '📉';
              if (changeNum < 0) return '⚠️';
              return '➡️';
            };

            let comment = `## 🎯 Performance Benchmark Results

            ${getGradeEmoji(grade)} **Overall Score:** ${score}/100 (Grade: ${grade})
            📊 **Scenarios:** ${passed}/${total} passed`;

            if (change && change !== '') {
              comment += `\n${getChangeEmoji(change)} **Performance Change:** ${parseFloat(change) > 0 ? '+' : ''}${change}%`;
            }

            if (regression) {
              comment += `\n\n⚠️ **Performance Regression Detected!**
              This PR introduces a performance regression. Please review the changes and optimize before merging.`;
            }

            comment += `\n\n📋 **Detailed Results:** Available in the [benchmark artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            // Find existing comment to update
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Performance Benchmark Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Performance regression check
        if: steps.benchmark.outputs.regression-detected == 'true'
        run: |
          echo "❌ Performance regression detected!"
          echo "Performance change: ${{ steps.benchmark.outputs.performance-change }}%"
          echo "Threshold: ${{ github.event.inputs.regression_threshold || '10' }}%"
          exit 1

  benchmark-comparison:
    name: Compare with Baseline
    runs-on: ubuntu-latest
    needs: performance-benchmarks
    if: github.event_name == 'pull_request'

    steps:
      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: current-results/

      - name: Download baseline
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline
          path: baseline/

      - name: Generate comparison report
        run: |
          echo "## 📊 Performance Comparison Report" >> comparison.md
          echo "" >> comparison.md
          
          if [ -f "baseline/baseline.json" ] && [ -f "current-results/benchmark-report-"*.json ]; then
            echo "Baseline found, generating detailed comparison..." >> comparison.md
            
            # Here you could add a script to generate detailed comparison
            # For now, just show basic info
            echo "- Current Score: ${{ needs.performance-benchmarks.outputs.benchmark-score }}/100" >> comparison.md
            echo "- Performance Change: ${{ needs.performance-benchmarks.outputs.performance-change }}%" >> comparison.md
            echo "- Scenarios Passed: ${{ needs.performance-benchmarks.outputs.scenarios-passed }}/${{ needs.performance-benchmarks.outputs.scenarios-total }}" >> comparison.md
          else
            echo "No baseline found for comparison. This will be the new baseline after merge." >> comparison.md
          fi

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison-${{ github.run_number }}
          path: comparison.md

  nightly-stress-test:
    name: Nightly Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.stress_test == 'true')
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine package
        run: pnpm --filter @doom-like/engine build

      - name: Run stress tests
        run: |
          cd packages/engine
          export CI_ARTIFACTS_DIR="../../stress-test-artifacts"
          export ENABLE_STRESS_TEST="true"
          mkdir -p ../../stress-test-artifacts
          
          pnpm tsx src/performance/ci-benchmark-runner.ts \
            --timeout 25 \
            --regression-threshold 5

      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results-${{ github.run_number }}
          path: stress-test-artifacts/
          retention-days: 7

      - name: Notify on stress test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly Stress Test Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly stress test has failed. Please investigate the performance issues.
              
              **Run Details:**
              - Workflow: [${context.workflow}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              - Commit: ${context.sha}
              - Branch: ${context.ref}
              
              **Next Steps:**
              1. Review the stress test artifacts
              2. Identify performance bottlenecks
              3. Implement optimizations
              4. Re-run the stress test`,
              labels: ['performance', 'bug', 'priority-high']
            });